<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙法カウンター 高感度版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Hiragino Mincho ProN', serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #status { position: absolute; top: 20px; font-size: 14px; color: #222; text-align: center; }
        #count-display {
            font-size: 180px; font-weight: bold; color: #ff4500;
            text-shadow: 0 0 20px #ff0000;
            transition: transform 0.05s ease-out;
        }
        #start-btn {
            padding: 25px 50px; font-size: 20px;
            background: #111; color: #444; border: 1px solid #222; border-radius: 50px;
            cursor: pointer; margin-top: 50px;
        }
        #reset-btn {
            position: absolute; bottom: 20px; right: 20px; font-size: 10px;
            background: transparent; color: #111; border: none; padding: 10px;
        }
    </style>
</head>
<body>

    <div id="status">READY</div>
    <div id="count-display">0</div>
    <button id="start-btn" onclick="toggleRecognition()">修行開始</button>
    <button id="reset-btn" onclick="resetCount()">RESET</button>

    <script>
        // 反応の鋭さ調整（ミリ秒）
        const COUNT_INTERVAL = 700; 
        
        let count = parseInt(localStorage.getItem('shugyo_count')) || 0;
        let isRecognizing = false;
        let lastCountTime = 0;
        
        const countDisplay = document.getElementById('count-display');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        countDisplay.innerText = count;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true; // 途中経過を拾う（これが重要）

        function toggleRecognition() {
            if (!isRecognizing) {
                recognition.start();
                isRecognizing = true;
                startBtn.innerText = "中断";
                statusDisplay.innerText = "ON";
            } else {
                recognition.stop();
                isRecognizing = false;
                startBtn.innerText = "修行開始";
                statusDisplay.innerText = "OFF";
            }
        }

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }

            const now = Date.now();
            
            // 判定：聞き間違えやすい音もすべて網羅
            // 「みょうほう」「みょーほー」「にょうほう」「れんげきょう」など
            if (/[みミ][ょョ][うウー][ほホ][うウー]|妙法|蓮華|れんげ/.test(transcript)) {
                if (now - lastCountTime > COUNT_INTERVAL) {
                    incrementCount();
                    lastCountTime = now;
                    // 反応したら即リセット（次の音を拾いやすくするため）
                    recognition.stop();
                }
            }
        };

        recognition.onend = () => {
            if (isRecognizing) recognition.start();
        };

        function incrementCount() {
            count++;
            countDisplay.innerText = count;
            localStorage.setItem('shugyo_count', count);

            countDisplay.style.transform = 'scale(1.25)';
            setTimeout(() => countDisplay.style.transform = 'scale(1)', 50);
            
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function resetCount() {
            if(confirm("リセット？")) {
                count = 0;
                countDisplay.innerText = 0;
                localStorage.removeItem('shugyo_count');
            }
        }
    </script>
</body>
</html>
