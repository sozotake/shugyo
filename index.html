<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煉獄・お題目カウンター V2</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Hiragino Mincho ProN', serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #status { position: absolute; top: 20px; font-size: 14px; color: #666; width: 100%; text-align: center; }
        #count-display {
            font-size: 140px; font-weight: bold; color: #ff4500;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff8c00;
            transition: transform 0.05s ease-out; z-index: 10;
        }
        #phrase-display { font-size: 20px; color: #aaa; margin-bottom: 20px; min-height: 24px; text-align: center; width: 80%; }
        #start-btn {
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            background: linear-gradient(45deg, #b22222, #ff4500);
            color: white; border: none; border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6); cursor: pointer;
            z-index: 20;
        }
        #reset-btn {
            position: absolute; bottom: 20px; right: 20px; font-size: 12px;
            background: #222; color: #555; border: 1px solid #333; padding: 5px 10px; border-radius: 5px;
        }
        .fire-particle {
            position: absolute; background: radial-gradient(#ffff00, #ff4500, transparent);
            border-radius: 50%; pointer-events: none; z-index: 1;
        }
    </style>
</head>
<body>

    <div id="status">読経を開始してください</div>

    <div id="container" style="text-align: center; width: 100%;">
        <div id="phrase-display">（待機中）</div>
        <div id="count-display">0</div>
        <button id="start-btn" onclick="toggleRecognition()">修行開始</button>
    </div>

    <button id="reset-btn" onclick="resetCount()">累計リセット</button>

    <script>
        // 設定値
        const COUNT_INTERVAL = 2000; // カウント後の無反応時間（2000ms = 2秒）
        
        let count = parseInt(localStorage.getItem('shugyo_count')) || 0; // 保存された値を取得
        let isRecognizing = false;
        let lastCountTime = 0;
        
        const countDisplay = document.getElementById('count-display');
        const phraseDisplay = document.getElementById('phrase-display');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        // 初期表示
        countDisplay.innerText = count;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        function toggleRecognition() {
            if (!isRecognizing) {
                recognition.start();
                isRecognizing = true;
                startBtn.innerText = "修行中断";
                startBtn.style.background = "#333";
                statusDisplay.innerText = "マイク稼働中：お題目をどうぞ";
            } else {
                recognition.stop();
                isRecognizing = false;
                startBtn.innerText = "修行再開";
                startBtn.style.background = "linear-gradient(45deg, #b22222, #ff4500)";
                statusDisplay.innerText = "一時停止中";
            }
        }

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                interimTranscript += event.results[i][0].transcript;
            }
            phraseDisplay.innerText = interimTranscript;

            const now = Date.now();
            // 特定のキーワードが含まれ、かつ前回のカウントから指定秒数経っているか
            if (/南無|なむ|妙法|蓮華|経/.test(interimTranscript)) {
                if (now - lastCountTime > COUNT_INTERVAL) {
                    incrementCount();
                    lastCountTime = now;
                    // iOSの重複判定を防ぐため一度リセット
                    recognition.stop();
                }
            }
        };

        recognition.onend = () => { if (isRecognizing) recognition.start(); };

        function incrementCount() {
            count++;
            countDisplay.innerText = count;
            localStorage.setItem('shugyo_count', count); // ブラウザに保存

            // 演出
            countDisplay.style.transform = 'scale(1.4)';
            setTimeout(() => countDisplay.style.transform = 'scale(1)', 70);
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]); // 煉獄っぽい振動
            createFire();
        }

        function resetCount() {
            if(confirm("累計カウントをリセットしますか？")) {
                count = 0;
                countDisplay.innerText = 0;
                localStorage.removeItem('shugyo_count');
            }
        }

        function createFire() {
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.classList.add('fire-particle');
                const size = Math.random() * 35 + 10 + 'px';
                p.style.width = size; p.style.height = size;
                const rect = countDisplay.getBoundingClientRect();
                p.style.left = rect.left + rect.width/2 + (Math.random()-0.5)*250 + 'px';
                p.style.top = rect.top + rect.height/2 + (Math.random()-0.5)*150 + 'px';
                document.body.appendChild(p);
                p.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 1 },
                    { transform: `translateY(-${Math.random()*500 + 200}px) rotate(${Math.random()*360}deg) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
