<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙法カウンター 最終版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Hiragino Mincho ProN', serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #status { position: absolute; top: 20px; font-size: 14px; color: #111; text-align: center; }
        #count-display {
            font-size: 180px; font-weight: bold; color: #ff4500;
            text-shadow: 0 0 20px #ff0000;
            transition: transform 0.05s ease-out;
        }
        #start-btn {
            padding: 25px 50px; font-size: 20px;
            background: #111; color: #333; border: 1px solid #222; border-radius: 50px;
            cursor: pointer; margin-top: 50px;
        }
    </style>
</head>
<body>

    <div id="status">FINAL VERSION</div>
    <div id="count-display">0</div>
    <button id="start-btn" onclick="toggleRecognition()">修行開始</button>

    <script>
        const COUNT_INTERVAL = 500; // 次のカウントまでの待ち時間（0.5秒）
        let count = parseInt(localStorage.getItem('shugyo_count')) || 0;
        let isRecognizing = false;
        let lastCountTime = 0;
        let watchdogTimer = null; // 強制リセット用タイマー
        
        const countDisplay = document.getElementById('count-display');
        const startBtn = document.getElementById('start-btn');

        countDisplay.innerText = count;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        function toggleRecognition() {
            if (!isRecognizing) {
                isRecognizing = true;
                startBtn.innerText = "中断";
                startBtn.style.color = "#800";
                startRecognition();
                // 3秒ごとに強制的にリセットをかけるウォッチドッグを開始
                watchdogTimer = setInterval(() => {
                    if (isRecognizing) {
                        console.log("Keep-alive reset");
                        recognition.stop();
                    }
                }, 3000); 
            } else {
                isRecognizing = false;
                clearInterval(watchdogTimer);
                recognition.stop();
                startBtn.innerText = "修行開始";
                startBtn.style.color = "#333";
            }
        }

        function startRecognition() {
            try { recognition.start(); } catch(e) {}
        }

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }

            const now = Date.now();
            
            // 判定：さらに広範囲に「妙法」に近い音を拾う
            if (/[みミ][ょョ][うウーおオ]|[妙みょ]法|蓮華|れんげ/.test(transcript)) {
                if (now - lastCountTime > COUNT_INTERVAL) {
                    incrementCount();
                    lastCountTime = now;
                    recognition.stop(); // 拾ったら即座にリセットして次に備える
                }
            }
        };

        // 停止したらいつでも即座に再起動（ウォッチドッグやカウント後の停止をカバー）
        recognition.onend = () => {
            if (isRecognizing) {
                startRecognition();
            }
        };

        function incrementCount() {
            count++;
            countDisplay.innerText = count;
            localStorage.setItem('shugyo_count', count);
            countDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => countDisplay.style.transform = 'scale(1)', 50);
            if (navigator.vibrate) navigator.vibrate(40);
        }
    </script>
</body>
</html>
