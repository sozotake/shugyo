<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妙法カウンター 決定版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Hiragino Mincho ProN', serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #status { position: absolute; top: 20px; font-size: 14px; color: #111; text-align: center; }
        #count-display {
            font-size: 180px; font-weight: bold; color: #ff4500;
            text-shadow: 0 0 20px #ff0000;
            transition: transform 0.05s ease-out;
        }
        #start-btn {
            padding: 25px 50px; font-size: 20px;
            background: #111; color: #444; border: 1px solid #222; border-radius: 50px;
            cursor: pointer; margin-top: 50px;
        }
        /* リセットボタンのスタイル */
        #reset-btn {
            position: absolute; bottom: 30px; right: 30px; font-size: 12px;
            background: #000; color: #333; border: 1px solid #111; padding: 10px 15px; border-radius: 5px;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="status">V3.0 STABLE</div>
    <div id="count-display">0</div>
    <button id="start-btn" onclick="toggleRecognition()">修行開始</button>
    
    <button id="reset-btn" onclick="resetCount()">RESET</button>

    <script>
        const COUNT_INTERVAL = 600; 
        let count = parseInt(localStorage.getItem('shugyo_count')) || 0;
        let isRecognizing = false;
        let lastCountTime = 0;
        
        const countDisplay = document.getElementById('count-display');
        const startBtn = document.getElementById('start-btn');

        countDisplay.innerText = count;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = true;
        recognition.interimResults = true;

        function toggleRecognition() {
            if (!isRecognizing) {
                isRecognizing = true;
                startBtn.innerText = "中断";
                startBtn.style.borderColor = "#600";
                recognition.start();
            } else {
                isRecognizing = false;
                recognition.stop();
                startBtn.innerText = "修行開始";
                startBtn.style.borderColor = "#222";
            }
        }

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }

            const now = Date.now();
            
            // 判定：妙法系統の音、または文章の区切りを検知
            if (/[みミ][ょョ][うウーおオ]|[妙みょ]法|蓮華|れんげ/.test(transcript)) {
                if (now - lastCountTime > COUNT_INTERVAL) {
                    incrementCount();
                    lastCountTime = now;
                    recognition.stop(); // 拾ったら即座にリセット
                }
            }
            
            // 長い文章になりそうな場合（句点など）もリセットをかけて感度を戻す
            if (transcript.includes('。') || transcript.length > 10) {
                recognition.stop();
            }
        };

        recognition.onend = () => {
            if (isRecognizing) {
                recognition.start();
            }
        };

        function incrementCount() {
            count++;
            countDisplay.innerText = count;
            localStorage.setItem('shugyo_count', count);
            countDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => countDisplay.style.transform = 'scale(1)', 50);
            if (navigator.vibrate) navigator.vibrate(40);
        }

        // 初期化機能
        function resetCount() {
            if (confirm("累計カウントを0に戻しますか？")) {
                count = 0;
                countDisplay.innerText = 0;
                localStorage.removeItem('shugyo_count');
            }
        }
    </script>
</body>
</html>
