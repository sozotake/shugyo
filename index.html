<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煉獄・お題目カウンター</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Hiragino Mincho ProN', 'serif';
            overflow: hidden; /* スクロール禁止 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #container {
            text-align: center;
            position: relative;
        }

        #count-display {
            font-size: 120px;
            font-weight: bold;
            color: #ff4500; /* 煉獄カラー（オレンジレッド） */
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff8c00;
            transition: transform 0.1s ease-out; /* カウント時の鼓動効果 */
        }

        #phrase-display {
            font-size: 24px;
            color: #ccc;
            margin-top: -10px;
            min-height: 30px;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #666;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff0000, #ff8c00);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            margin-top: 30px;
        }

        /* 炎のエフェクト（パーティクル） */
        .fire-particle {
            position: absolute;
            background: radial-gradient(#ffff00, #ff4500, transparent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

    </style>
</head>
<body>

    <div id="status">待機中...</div>

    <div id="container">
        <div id="phrase-display">（ここにお題目が出ます）</div>
        <div id="count-display">0</div>
        <button id="start-btn">修行開始 (マイクON)</button>
    </div>

    <script>
        let count = 0;
        const countDisplay = document.getElementById('count-display');
        const phraseDisplay = document.getElementById('phrase-display');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const container = document.getElementById('container');

        // 音声認識の設定
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusDisplay.innerText = "このブラウザは音声認識非対応です。Safari等を使ってください。";
            startBtn.style.display = 'none';
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true; // 連続認識
            recognition.interimResults = true; // 途中結果を取得（ここがリアルタイム性の鍵）

            let isRecognizing = false;

            startBtn.addEventListener('click', () => {
                if (!isRecognizing) {
                    recognition.start();
                    startBtn.innerText = "修行中... (停止するには画面タップ)";
                    startBtn.style.opacity = 0.5;
                    statusDisplay.innerText = "マイク聴取中...";
                    isRecognizing = true;
                }
            });

            // 画面全体をタップで停止できるようにする
            document.body.addEventListener('click', (e) => {
                if (isRecognizing && e.target !== startBtn) {
                    recognition.stop();
                    startBtn.innerText = "修行を再開";
                    startBtn.style.opacity = 1;
                    statusDisplay.innerText = "停止中";
                    isRecognizing = false;
                }
            });

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        // 確定した結果（ここではあまり使わない）
                    } else {
                        // 途中結果を解析
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                phraseDisplay.innerText = interimTranscript;

                // 「南無」「妙法」の音節を聞き取ったらカウント
                // 高速認識のため、短いキーワードで判定します。
                if (interimTranscript.includes('妙法') || interimTranscript.includes('みょうほう')) {
                    incrementCount();
                    // 認識した部分をクリアして重複カウントを防ぐ
                    recognition.stop(); 
                    setTimeout(() => recognition.start(), 10); // すぐに再開
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error", event.error);
                statusDisplay.innerText = "エラー: " + event.error;
                isRecognizing = false;
            };

            recognition.onend = () => {
                // 自動で止まった場合、修行中なら再開させる
                if (isRecognizing) {
                    recognition.start();
                }
            };
        }

        // カウントアップと演出
        function incrementCount() {
            count++;
            countDisplay.innerText = count;

            // 1. カウント表示を鼓動させる
            countDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => countDisplay.style.transform = 'scale(1)', 100);

            // 2. 炎のパーティクル（煉獄エフェクト）を生成
            createFireEffect();
        }

        // 炎のエフェクトを生成する関数
        function createFireEffect() {
            for (let i = 0; i < 15; i++) { // パーティクルの数
                const particle = document.createElement('div');
                particle.classList.add('fire-particle');
                
                // サイズ、位置、速度をランダムに
                const size = Math.random() * 20 + 10 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                
                // カウント表示の周りから発生
                const rect = countDisplay.getBoundingClientRect();
                particle.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width + 'px';
                particle.style.top = rect.top + rect.height / 2 + (Math.random() - 0.5) * rect.height + 'px';

                document.body.appendChild(particle);

                // アニメーション（上へ昇りながら消える）
                particle.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 1 },
                    { transform: `translateY(-${Math.random() * 200 + 100}px) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 500, // 0.5〜1.5秒
                    easing: 'ease-out'
                }).onfinish = () => particle.remove(); // アニメーション終了後に削除
            }
        }

    </script>
</body>
</html>
